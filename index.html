<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobalt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2a2a2a;
    --text:     #e8e8e8;
    --muted:    #666;
    --accent:   #4f8ef7;
    --green:    #4caf50;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'IBM Plex Sans', system-ui, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  header {
    padding: 2.5rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header p {
    margin-top: 0.35rem;
    font-size: 0.875rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 2rem;
    max-width: 1000px;
  }

  .card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    cursor: pointer;
  }

  .card:hover {
    border-color: #444;
    background: #202020;
  }

  .card-icon {
    font-size: 2rem;
    line-height: 1;
    margin-bottom: 0.75rem;
    display: block;
  }

  .card-name {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.35rem;
  }

  .card-desc {
    font-size: 0.825rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-dot {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }

  .card-dot.active {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .card-path {
    margin-top: 1rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: #444;
  }

  footer {
    padding: 2rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: #333;
  }
</style>
</head>
<body>

<header>
  <h1>Kobalt</h1>
  <p>sistema de mini apps · fase α</p>
</header>

<div class="grid" id="grid"></div>

<footer id="footer">cargando...</footer>

<script>
const APPS = [
  {
    id:    'notas',
    nombre:'Notas',
    desc:  'Captura rápida de ideas y texto libre',
    icono: '📝',
    path:  './notas/',
    idb:   'data_Kobalt-Notas',
  },
  {
    id:    'gastos',
    nombre:'Gastos',
    desc:  'Registro offline de gastos e ingresos',
    icono: '💸',
    path:  './gastos/',
    idb:   'data_Kobalt-Gastos',
  },
  {
    id:    'checklist',
    nombre:'Checklist',
    desc:  'Listas de verificación y tareas rápidas',
    icono: '✅',
    path:  './checklist/',
    idb:   'data_Kobalt-Checklist',
  },
  {
    id:    'visitas',
    nombre:'Visitas',
    desc:  'Registro de visitas técnicas con evidencia',
    icono: '📍',
    path:  './visitas/',
    idb:   'data_Kobalt-Visitas',
  },
]

async function hasLocalData(idbName) {
  try {
    const dbs = await indexedDB.databases()
    return dbs.some(d => d.name === idbName)
  } catch { return false }
}

async function renderGrid() {
  const grid = document.getElementById('grid')
  grid.innerHTML = ''

  const states = await Promise.all(APPS.map(a => hasLocalData(a.idb)))

  APPS.forEach((app, i) => {
    const hasData = states[i]
    const card = document.createElement('a')
    card.className = 'card'
    card.href = app.path
    card.innerHTML = `
      <span class="card-dot ${hasData ? 'active' : ''}" title="${hasData ? 'datos locales presentes' : 'sin datos locales'}"></span>
      <span class="card-icon">${app.icono}</span>
      <div class="card-name">${app.nombre}</div>
      <div class="card-desc">${app.desc}</div>
      <div class="card-path">${app.path}</div>
    `
    grid.appendChild(card)
  })

  const footer = document.getElementById('footer')
  const active = states.filter(Boolean).length
  footer.textContent = `${active} / ${APPS.length} apps con datos locales · ${new Date().toISOString().slice(0,10)}`
}

renderGrid()
</script>
</body>
</html>
