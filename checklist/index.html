<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobalt · Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f0f0f;
    --surface: #1a1a1a;
    --border:  #2a2a2a;
    --text:    #e8e8e8;
    --muted:   #666;
    --accent:  #4f8ef7;
    --green:   #4caf50;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'IBM Plex Sans', system-ui, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── HEADER ────────────────────────────────────── */
  header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  #btn-back {
    display: none;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1.1rem;
    padding: 0.35rem 0.65rem;
    cursor: pointer;
    line-height: 1;
  }
  #btn-back:hover { border-color: #444; background: #202020; }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    flex: 1;
  }

  #sync-status {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── LISTAS VIEW ───────────────────────────────── */
  #view-listas { display: block; }
  #view-detalle { display: none; }

  .listas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 1.5rem;
    max-width: 900px;
  }

  .lista-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.25rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .lista-card:hover { border-color: #444; background: #202020; }

  .lista-card-name {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lista-card-progress {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    min-width: 3.5rem;
    text-align: right;
  }

  .empty-state {
    padding: 3rem 1.5rem;
    color: var(--muted);
    font-size: 0.875rem;
    font-family: var(--mono);
  }

  /* ── FAB ───────────────────────────────────────── */
  #fab {
    position: fixed;
    bottom: 1.75rem;
    right: 1.75rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 1.6rem;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(79,142,247,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, box-shadow 0.15s;
    z-index: 100;
  }
  #fab:hover { background: #3a7de8; box-shadow: 0 4px 24px rgba(79,142,247,0.5); }

  /* ── MODAL NUEVA LISTA ─────────────────────────── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    width: min(360px, 90vw);
  }

  #modal h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  #modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.95rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  #modal input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
    justify-content: flex-end;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-size: 0.875rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: var(--sans);
  }
  .btn-secondary:hover { border-color: #444; color: var(--text); }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.5rem 1.25rem;
    cursor: pointer;
    font-family: var(--sans);
  }
  .btn-primary:hover { background: #3a7de8; }

  /* ── DETALLE VIEW ──────────────────────────────── */
  #detalle-title {
    font-size: 1.1rem;
    font-weight: 600;
  }

  .items-list {
    padding: 0.75rem 1.5rem;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .item-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.1s;
  }
  .item-row:hover { border-color: #444; }

  /* Custom checkbox */
  .item-check {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .item-check:hover { border-color: var(--green); }
  .item-check.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .item-check.checked::after {
    content: '';
    display: block;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .item-texto {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.4;
    word-break: break-word;
  }
  .item-texto.done {
    text-decoration: line-through;
    color: #555;
  }

  /* Inline add input */
  .add-item-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 0.85rem;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-top: 0.4rem;
    transition: border-color 0.15s;
  }
  .add-item-row:focus-within { border-color: var(--accent); border-style: solid; }

  .add-item-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px dashed var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1;
  }

  #input-nuevo-item {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.9rem;
    outline: none;
  }
  #input-nuevo-item::placeholder { color: var(--muted); }

  /* ── FOOTER ────────────────────────────────────── */
  footer {
    padding: 1.5rem;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: #333;
    max-width: 900px;
  }
</style>
</head>
<body>

<header>
  <button id="btn-back" title="Volver">&#8592;</button>
  <h1 id="header-title">Checklist</h1>
  <span id="sync-status">—</span>
</header>

<!-- VISTA: LISTAS -->
<div id="view-listas">
  <div class="listas-grid" id="listas-grid"></div>
  <footer id="footer-listas">—</footer>
</div>

<!-- VISTA: DETALLE -->
<div id="view-detalle">
  <div class="items-list" id="items-list"></div>
  <footer id="footer-detalle">—</footer>
</div>

<!-- FAB -->
<button id="fab" title="Nueva lista">+</button>

<!-- MODAL NUEVA LISTA -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Nueva lista</h2>
    <input type="text" id="input-nombre-lista" placeholder="Nombre de la lista…" maxlength="80" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-modal-cancel">Cancelar</button>
      <button class="btn-primary" id="btn-modal-ok">Crear</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTES ─────────────────────────────────────────────────────────────
const APP_NAME = 'Kobalt-Checklist';
const SAVE_URL = './save.php';
const DATA_URL = './data';
const IDB_NAME = 'data_' + APP_NAME;

// ── IDB ────────────────────────────────────────────────────────────────────
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) { resolve(_db); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('kv')) {
        db.createObjectStore('kv');
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function idbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = e => reject(e.target.error);
  });
}

function idbSet(key, val) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').put(val, key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

function idbGetAll(prefix) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction('kv', 'readonly');
    const store = tx.objectStore('kv');
    const range = IDBKeyRange.bound(prefix, prefix + '\uffff');
    const req = store.getAll(range);
    req.onsuccess = () => resolve(req.result ?? []);
    req.onerror   = e => reject(e.target.error);
  });
}

// ── UTILIDADES ─────────────────────────────────────────────────────────────
function newId() {
  return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

function now() {
  return Math.floor(Date.now() / 1000);
}

// ── OMEGA ──────────────────────────────────────────────────────────────────
async function getOmega() {
  return (await idbGet('m:omega')) || {};
}

async function saveOmega(o) {
  await idbSet('m:omega', o);
}

// ── SAVE ENTITY ────────────────────────────────────────────────────────────
// prefix ∈ {'a', 'c'}
async function saveEntity(prefix, entity) {
  const key = prefix + ':' + entity.id;
  await idbSet(key, entity);
  const omega = await getOmega();
  omega[key] = entity.ts;
  await saveOmega(omega);
}

// ── OPERACIONES DE DOMINIO ─────────────────────────────────────────────────
async function createLista(nombre) {
  const lista = {
    id:      newId(),
    nombre:  nombre.trim(),
    members: [],
    ts:      now(),
  };
  await saveEntity('c', lista);
  return lista;
}

async function addItem(listaId, texto) {
  const item = {
    id:          newId(),
    texto:       texto.trim(),
    completado:  false,
    listaId:     listaId,
    ts:          now(),
  };
  await saveEntity('a', item);

  // Actualizar lista (push id a members, actualizar ts) — garantiza sync
  const lista = await idbGet('c:' + listaId);
  if (lista) {
    lista.members = Array.isArray(lista.members) ? lista.members : [];
    lista.members.push(item.id);
    lista.ts = now();
    await saveEntity('c', lista);
  }
  return item;
}

async function toggleItem(itemId) {
  const item = await idbGet('a:' + itemId);
  if (!item) return;
  // I2: id no cambia — solo flip completado y actualizar ts
  item.completado = !item.completado;
  item.ts = now();
  await saveEntity('a', item);
}

async function getListas() {
  const all = await idbGetAll('c:');
  return all.sort((a, b) => (b.ts || 0) - (a.ts || 0));
}

async function getItemsDeLista(listaId) {
  const all = await idbGetAll('a:');
  return all.filter(item => item.listaId === listaId);
}

// ── SYNC ───────────────────────────────────────────────────────────────────
let _syncing = false;

async function syncNow() {
  if (_syncing) return 0;
  _syncing = true;
  setSyncStatus('syncing…');
  let pulled = 0;

  try {
    // Obtener manifest remoto
    const resp = await fetch(SAVE_URL + '?key=manifest', { cache: 'no-store' });
    const omegaR = resp.ok ? await resp.json() : {};
    const omegaL = await getOmega();

    const toPush = [];
    const toPull = [];

    // Calcular delta
    const allKeys = new Set([...Object.keys(omegaL), ...Object.keys(omegaR)]);
    for (const key of allKeys) {
      const tsL = omegaL[key] || 0;
      const tsR = omegaR[key] || 0;
      if (tsL > tsR) toPush.push(key);
      else if (tsR > tsL) toPull.push(key);
    }

    // PUSH
    if (toPush.length > 0) {
      const items = [];
      for (const key of toPush) {
        const val = await idbGet(key);
        if (val !== null) {
          items.push({ key, payload: val, ts: omegaL[key] || 0 });
        }
      }
      if (items.length > 0) {
        await fetch(SAVE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'push', items }),
        });
      }
    }

    // PULL
    if (toPull.length > 0) {
      const newOmega = Object.assign({}, omegaL);
      for (const key of toPull) {
        try {
          const r = await fetch(SAVE_URL + '?key=' + encodeURIComponent(key), { cache: 'no-store' });
          if (r.ok) {
            const entity = await r.json();
            if (entity && entity.id !== undefined) {
              await idbSet(key, entity);
              newOmega[key] = omegaR[key];
              pulled++;
            }
          }
        } catch (_) { /* continuar */ }
      }
      await saveOmega(newOmega);
    }

    setSyncStatus(pulled > 0 ? `sync +${pulled}` : 'sync ok');
  } catch (err) {
    setSyncStatus('sync err');
  } finally {
    _syncing = false;
  }

  // I5: sync ≠ repaint — render SOLO si pulled > 0
  if (pulled > 0) await render();
  return pulled;
}

function startSyncLoop() {
  syncNow();
  setInterval(syncNow, 30000);
}

function setSyncStatus(msg) {
  document.getElementById('sync-status').textContent = msg;
}

// ── ESTADO ─────────────────────────────────────────────────────────────────
let view = 'listas';       // 'listas' | 'detalle'
let currentListaId = null;

// ── RENDER ─────────────────────────────────────────────────────────────────
async function render() {
  if (view === 'listas') {
    await renderListas();
  } else {
    await renderDetalle();
  }
}

async function renderListas() {
  document.getElementById('view-listas').style.display = 'block';
  document.getElementById('view-detalle').style.display = 'none';
  document.getElementById('btn-back').style.display = 'none';
  document.getElementById('header-title').textContent = 'Checklist';
  document.getElementById('fab').style.display = 'flex';

  const listas = await getListas();
  const grid = document.getElementById('listas-grid');
  grid.innerHTML = '';

  if (listas.length === 0) {
    grid.innerHTML = '<p class="empty-state">Sin listas. Pulsa + para crear una.</p>';
    document.getElementById('footer-listas').textContent = '0 listas';
    return;
  }

  for (const lista of listas) {
    const items = await getItemsDeLista(lista.id);
    const total = items.length;
    const done  = items.filter(i => i.completado).length;
    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'lista-card';
    card.innerHTML = `
      <div class="lista-card-name" title="${escHtml(lista.nombre)}">${escHtml(lista.nombre)}</div>
      <div class="lista-card-progress">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
        <span class="progress-label">${done}/${total}</span>
      </div>
    `;
    card.addEventListener('click', () => openDetalle(lista.id));
    grid.appendChild(card);
  }

  document.getElementById('footer-listas').textContent =
    `${listas.length} lista${listas.length !== 1 ? 's' : ''}`;
}

async function renderDetalle() {
  document.getElementById('view-listas').style.display = 'none';
  document.getElementById('view-detalle').style.display = 'block';
  document.getElementById('btn-back').style.display = 'inline-flex';
  document.getElementById('fab').style.display = 'none';

  const lista = await idbGet('c:' + currentListaId);
  if (!lista) { goToListas(); return; }

  document.getElementById('header-title').textContent = escHtml(lista.nombre);
  document.title = `${lista.nombre} · Kobalt Checklist`;

  const items = await getItemsDeLista(currentListaId);
  items.sort((a, b) => (a.ts || 0) - (b.ts || 0));

  const container = document.getElementById('items-list');
  container.innerHTML = '';

  for (const item of items) {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.dataset.id = item.id;

    const chk = document.createElement('div');
    chk.className = 'item-check' + (item.completado ? ' checked' : '');
    chk.title = item.completado ? 'Marcar pendiente' : 'Marcar completado';

    const txt = document.createElement('div');
    txt.className = 'item-texto' + (item.completado ? ' done' : '');
    txt.textContent = item.texto;

    chk.addEventListener('click', async () => {
      await toggleItem(item.id);
      // I5: no llamar render() completo — solo actualizar el DOM del ítem
      item.completado = !item.completado;
      chk.classList.toggle('checked');
      chk.title = item.completado ? 'Marcar pendiente' : 'Marcar completado';
      txt.classList.toggle('done');
    });

    row.appendChild(chk);
    row.appendChild(txt);
    container.appendChild(row);
  }

  // Input inline para añadir ítem
  const addRow = document.createElement('div');
  addRow.className = 'add-item-row';
  addRow.innerHTML = `
    <div class="add-item-icon">+</div>
    <input type="text" id="input-nuevo-item" placeholder="Nuevo ítem…" maxlength="200" autocomplete="off">
  `;
  container.appendChild(addRow);

  const inp = addRow.querySelector('#input-nuevo-item');
  inp.addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
      const texto = inp.value.trim();
      if (!texto) return;
      inp.value = '';
      inp.disabled = true;
      await addItem(currentListaId, texto);
      inp.disabled = false;
      await renderDetalle();
      // Reenfocar el input tras re-render
      const newInp = document.getElementById('input-nuevo-item');
      if (newInp) newInp.focus();
    }
  });

  const total = items.length;
  const done  = items.filter(i => i.completado).length;
  document.getElementById('footer-detalle').textContent =
    `${done} de ${total} completado${done !== 1 ? 's' : ''}`;
}

// ── NAVEGACIÓN ─────────────────────────────────────────────────────────────
async function openDetalle(listaId) {
  currentListaId = listaId;
  view = 'detalle';
  await render();
}

async function goToListas() {
  currentListaId = null;
  view = 'listas';
  document.title = 'Kobalt · Checklist';
  await render();
}

// ── MODAL NUEVA LISTA ──────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  const inp = document.getElementById('input-nombre-lista');
  inp.value = '';
  setTimeout(() => inp.focus(), 60);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('fab').addEventListener('click', openModal);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('input-nombre-lista').addEventListener('keydown', async e => {
  if (e.key === 'Enter') await confirmarNuevaLista();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('btn-modal-ok').addEventListener('click', confirmarNuevaLista);

async function confirmarNuevaLista() {
  const nombre = document.getElementById('input-nombre-lista').value.trim();
  if (!nombre) return;
  closeModal();
  await createLista(nombre);
  await render();
}

// ── BOTÓN VOLVER ───────────────────────────────────────────────────────────
document.getElementById('btn-back').addEventListener('click', goToListas);

// ── HELPERS ────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  await openDB();
  await render();
  startSyncLoop();
}

init();
</script>
</body>
</html>
