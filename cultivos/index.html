<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobalt Cultivos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2a2a2a;
    --text:     #e8e8e8;
    --muted:    #666;
    --accent:   #4f8ef7;
    --activo:   #4caf50;
    --cosechado:#ff9800;
    --perdido:  #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── Layout ── */
  #app { max-width: 640px; margin: 0 auto; padding: 16px; }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
  }
  header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  #sync-status {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }
  #sync-status.syncing { color: var(--accent); }
  #sync-status.error   { color: #ef5350; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-title { font-weight: 600; margin-bottom: 4px; }
  .card-sub   { font-size: 12px; color: var(--muted); }

  /* ── Cultivo card grid ── */
  #cultivos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .cultivo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cultivo-card:hover { border-color: var(--accent); }
  .cultivo-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .cultivo-thumb {
    width: 54px;
    height: 54px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cultivo-thumb-placeholder {
    width: 54px;
    height: 54px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .cultivo-info { flex: 1; min-width: 0; }
  .cultivo-nombre { font-weight: 600; font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cultivo-especie { font-size: 12px; color: var(--muted); }
  .cultivo-fecha { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); margin-top: 2px; }

  /* ── Badge estado cultivo ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .badge-activo    { background: #4caf5022; color: var(--activo);    border: 1px solid #4caf5055; }
  .badge-cosechado { background: #ff980022; color: var(--cosechado); border: 1px solid #ff980055; }
  .badge-perdido   { background: #66666622; color: var(--perdido);   border: 1px solid #66666655; }

  /* ── Badge tipo entrada ── */
  .badge-siembra       { background: #4caf5022; color: #81c784;  border: 1px solid #4caf5044; }
  .badge-riego         { background: #2196f322; color: #64b5f6;  border: 1px solid #2196f344; }
  .badge-fertilizacion { background: #8bc34a22; color: #aed581;  border: 1px solid #8bc34a44; }
  .badge-poda          { background: #ff572222; color: #ef9a9a;  border: 1px solid #ff572244; }
  .badge-cosecha       { background: #ff980022; color: #ffb74d;  border: 1px solid #ff980044; }
  .badge-observacion   { background: #9c27b022; color: #ce93d8;  border: 1px solid #9c27b044; }
  .badge-problema      { background: #ef535022; color: #e57373;  border: 1px solid #ef535044; }

  /* ── Chip filtros ── */
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .chip {
    display: inline-flex; align-items: center;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    background: var(--surface);
    color: var(--muted);
  }
  .chip.active { border-color: var(--accent); color: var(--text); }
  .chip-activo.active    { border-color: var(--activo);    color: var(--activo); }
  .chip-cosechado.active { border-color: var(--cosechado); color: var(--cosechado); }
  .chip-perdido.active   { border-color: var(--perdido);   color: var(--text); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-sm      { padding: 5px 12px; font-size: 13px; }
  .btn-estado  { padding: 6px 12px; font-size: 13px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .btn-estado.active-activo    { border-color: var(--activo);    color: var(--activo); }
  .btn-estado.active-cosechado { border-color: var(--cosechado); color: var(--cosechado); }
  .btn-estado.active-perdido   { border-color: var(--perdido);   color: var(--muted); }

  /* ── Toolbar row ── */
  .toolbar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }

  /* ── Back button ── */
  .back-btn {
    background: none; border: none; color: var(--accent);
    font-size: 14px; cursor: pointer; padding: 0; font-family: inherit;
    display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Timeline entrada ── */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .entrada-item {
    display: flex;
    gap: 14px;
    padding: 0 0 18px 0;
    position: relative;
  }
  .entrada-item::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 28px;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .entrada-item:last-child::before { display: none; }
  .entrada-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color .15s;
  }
  .entrada-dot:hover { border-color: var(--accent); }
  .entrada-body {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .entrada-body:hover { border-color: var(--accent); }
  .entrada-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .entrada-fecha { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
  .entrada-desc { font-size: 14px; color: var(--text); line-height: 1.5; }
  .entrada-fotos { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .entrada-thumb {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 5px;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  /* ── Photo grid ── */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .photo-thumb {
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
    width: 100%;
    cursor: pointer;
    display: block;
  }
  .photo-placeholder {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 26px;
    cursor: pointer;
  }

  /* ── Detail fields ── */
  .detail-field { margin-bottom: 14px; }
  .detail-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .detail-value { font-size: 15px; }
  .estado-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

  /* ── Description textarea ── */
  .desc-edit {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color .15s;
    line-height: 1.55;
  }
  .desc-edit:focus { border-color: var(--accent); }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: #000a;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

  /* ── Form ── */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── Empty ── */
  .empty { color: var(--muted); font-size: 14px; padding: 24px 0; text-align: center; }

  /* ── FAB ── */
  #fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.6rem;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(79,142,247,.45);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s, box-shadow .15s;
    z-index: 50;
  }
  #fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(79,142,247,.6); }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0;
    background: #000d;
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    cursor: zoom-out;
  }
  .lightbox img { max-width: 95vw; max-height: 92vh; border-radius: 6px; object-fit: contain; }

  /* ── Galería section ── */
  .galeria-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
  @media (max-width: 480px) { .galeria-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="header-title">Kobalt Cultivos</h1>
    <span id="sync-status">—</span>
  </header>
  <div id="view-container"></div>
</div>

<!-- FAB -->
<button id="fab" title="Nuevo">+</button>

<!-- Modal crear cultivo -->
<div id="modal-cultivo" class="modal-backdrop" style="display:none">
  <div class="modal">
    <h2>Nuevo cultivo</h2>
    <div class="field">
      <label>Nombre</label>
      <input id="f-nombre" type="text" placeholder="Ej: Tomates maceta A">
    </div>
    <div class="field">
      <label>Especie</label>
      <input id="f-especie" type="text" placeholder="Ej: Solanum lycopersicum">
    </div>
    <div class="field">
      <label>Fecha siembra (opcional)</label>
      <input id="f-fecha-siembra" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitCultivo()">Crear</button>
    </div>
  </div>
</div>

<!-- Modal crear entrada -->
<div id="modal-entrada" class="modal-backdrop" style="display:none">
  <div class="modal">
    <h2>Nueva entrada</h2>
    <div class="field">
      <label>Tipo</label>
      <select id="f-tipo">
        <option value="siembra">🌱 Siembra</option>
        <option value="riego">💧 Riego</option>
        <option value="fertilizacion">🌿 Fertilización</option>
        <option value="poda">✂️ Poda</option>
        <option value="cosecha">🌾 Cosecha</option>
        <option value="observacion" selected>👁️ Observación</option>
        <option value="problema">⚠️ Problema</option>
      </select>
    </div>
    <div class="field">
      <label>Descripción</label>
      <textarea id="f-descripcion" placeholder="Describe la actividad..."></textarea>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input id="f-fecha-entrada" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitEntrada()">Guardar</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Constantes ──────────────────────────────────────────────────────────────
const APP_NAME = 'Kobalt-Cultivos';
const SAVE_URL = './save.php';
const DATA_URL = './data';
const IDB_NAME = 'data_' + APP_NAME;

// ── Helpers ──────────────────────────────────────────────────────────────────
function newId() { return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6); }
function now()   { return Math.floor(Date.now() / 1000); }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const TIPO_META = {
  siembra:       { emoji: '🌱', label: 'Siembra',       cls: 'badge-siembra' },
  riego:         { emoji: '💧', label: 'Riego',         cls: 'badge-riego' },
  fertilizacion: { emoji: '🌿', label: 'Fertilización', cls: 'badge-fertilizacion' },
  poda:          { emoji: '✂️', label: 'Poda',          cls: 'badge-poda' },
  cosecha:       { emoji: '🌾', label: 'Cosecha',        cls: 'badge-cosecha' },
  observacion:   { emoji: '👁️', label: 'Observación',   cls: 'badge-observacion' },
  problema:      { emoji: '⚠️', label: 'Problema',       cls: 'badge-problema' },
};

// ── IDB ─────────────────────────────────────────────────────────────────────
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
    };
    req.onsuccess = e => { _db = e.target.result; resolve(); };
    req.onerror   = e => reject(e.target.error);
  });
}

function idbGet(key) {
  return new Promise((resolve, reject) => {
    const tx  = _db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function idbSet(key, value) {
  return new Promise((resolve, reject) => {
    const tx  = _db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

function idbGetAll(prefix) {
  return new Promise((resolve, reject) => {
    const tx    = _db.transaction('kv', 'readonly');
    const store = tx.objectStore('kv');
    const range = IDBKeyRange.bound(prefix, prefix + '\uffff');
    const req   = store.getAll(range);
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = e => reject(e.target.error);
  });
}

// ── Omega ───────────────────────────────────────────────────────────────────
async function getOmega() { return (await idbGet('m:omega')) || {}; }
async function saveOmega(o) { await idbSet('m:omega', o); }

// ── saveEntity ───────────────────────────────────────────────────────────────
async function saveEntity(prefix, entity) {
  const key = prefix + ':' + entity.id;
  await idbSet(key, entity);
  const omega = await getOmega();
  omega[key] = entity.ts;
  await saveOmega(omega);
}

// ── Operaciones de dominio ───────────────────────────────────────────────────
async function createCultivo(nombre, especie, fechaSiembra) {
  const e = { id: newId(), nombre, especie, fechaSiembra: fechaSiembra || null, estado: 'activo', members: [], ts: now() };
  await saveEntity('c', e);
  return e;
}

async function addEntrada(cultivoId, tipo, descripcion, fechaISO) {
  const e = { id: newId(), cultivoId, tipo, descripcion, fechaISO, ts: now() };
  await saveEntity('a', e);
  const cultivo = await idbGet('c:' + cultivoId);
  if (cultivo) {
    cultivo.members = [...(cultivo.members || []), e.id];
    cultivo.ts = now();
    await saveEntity('c', cultivo);
  }
  return e;
}

async function setEstadoCultivo(id, estado) {
  const c = await idbGet('c:' + id);
  if (!c) return;
  c.estado = estado;
  c.ts = now();
  await saveEntity('c', c);
}

async function updateEntradaDescripcion(entradaId, descripcion) {
  const e = await idbGet('a:' + entradaId);
  if (!e) return;
  e.descripcion = descripcion;
  e.ts = now();
  await saveEntity('a', e);
}

async function addFoto(entradaId, cultivoId, file) {
  const id = newId();
  const ext = (file.name || '').split('.').pop().toLowerCase() || 'jpg';
  const buf = await file.arrayBuffer();
  await idbSet('blob:' + id, buf);
  const meta = { id, entradaId, cultivoId, mime: file.type || 'image/jpeg', ext, ts: now() };
  await saveEntity('b', meta);
  try {
    const form = new FormData();
    form.append('photo', file);
    form.append('id', id);
    form.append('ext', ext);
    await fetch(SAVE_URL, { method: 'POST', body: form });
  } catch (err) { console.warn('upload foto falló:', err); }
  return meta;
}

async function getFotosDeCultivo(cultivoId) {
  const all = await idbGetAll('b:');
  return all.filter(m => m.cultivoId === cultivoId).sort((a, b) => a.ts - b.ts);
}

async function getFotosDeEntrada(entradaId) {
  const all = await idbGetAll('b:');
  return all.filter(m => m.entradaId === entradaId).sort((a, b) => a.ts - b.ts);
}

async function getEntradasDe(cultivoId) {
  const all = await idbGetAll('a:');
  return all.filter(e => e.cultivoId === cultivoId)
            .sort((a, b) => b.fechaISO.localeCompare(a.fechaISO));
}

async function fotoSrc(meta) {
  const buf = await idbGet('blob:' + meta.id);
  if (buf) {
    const blob = new Blob([buf], { type: meta.mime });
    return URL.createObjectURL(blob);
  }
  return DATA_URL + '/photos/' + encodeURIComponent(meta.id) + '.' + encodeURIComponent(meta.ext);
}

// ── Sync ─────────────────────────────────────────────────────────────────────
function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className   = cls || '';
}

async function syncNow() {
  setSyncStatus('syncing…', 'syncing');
  try {
    const res = await fetch(DATA_URL + '/manifest.json?t=' + Date.now());
    let omegaR = {};
    if (res.ok) { try { omegaR = await res.json(); } catch (_) { omegaR = {}; } }

    const omegaL = await getOmega();

    // blob:* excluidos del sync manifest
    const allKeys = new Set([
      ...Object.keys(omegaL).filter(k => /^[abc]:/.test(k)),
      ...Object.keys(omegaR).filter(k => /^[abc]:/.test(k))
    ]);

    const toPush = [];
    const toPull = [];
    for (const key of allKeys) {
      const tsL = omegaL[key] || 0;
      const tsR = omegaR[key] || 0;
      if (tsL > tsR) toPush.push(key);
      else if (tsR > tsL) toPull.push(key);
    }

    if (toPush.length) {
      for (const key of toPush) {
        const val = await idbGet(key);
        if (!val) continue;
        const [prefix, id] = key.split(':');
        await fetch(SAVE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'put', path: `${prefix}/${id}.json`, data: val })
        });
      }
      const merged = {};
      for (const k of allKeys) merged[k] = Math.max(omegaL[k] || 0, omegaR[k] || 0);
      await fetch(SAVE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'manifest', data: merged })
      });
      await saveOmega(merged);
    }

    let pulled = 0;
    for (const key of toPull) {
      try {
        const r = await fetch(DATA_URL + '/' + key.replace(':', '/') + '.json?t=' + Date.now());
        if (r.ok) {
          const entity = await r.json();
          await idbSet(key, entity);
          omegaL[key] = omegaR[key];
          pulled++;
        }
      } catch (_) { /* offline */ }
    }
    if (pulled > 0) { await saveOmega(omegaL); await render(); }

    setSyncStatus('sync ' + new Date().toLocaleTimeString(), '');
  } catch (e) {
    console.warn('Sync error:', e);
    setSyncStatus('offline', 'error');
  }
}

function startSyncLoop() { syncNow(); setInterval(syncNow, 30000); }

// ── Estado de navegación ──────────────────────────────────────────────────────
let view            = 'cultivos';
let currentCultivoId = null;
let currentEntradaId = null;
let filtroEstado    = 'activo';

// ── Render ───────────────────────────────────────────────────────────────────
async function render() {
  const container = document.getElementById('view-container');
  const header    = document.getElementById('header-title');
  const fab       = document.getElementById('fab');

  if (view === 'cultivos') {
    header.textContent = 'Kobalt Cultivos';
    fab.style.display  = 'flex';
    container.innerHTML = await renderCultivos();
  } else if (view === 'cultivo-detalle') {
    const c = await idbGet('c:' + currentCultivoId);
    header.textContent = c ? c.nombre : 'Cultivo';
    fab.style.display  = 'none';
    container.innerHTML = await renderCultivoDetalle(currentCultivoId);
  } else if (view === 'entrada-detalle') {
    const e = await idbGet('a:' + currentEntradaId);
    header.textContent = e ? ((TIPO_META[e.tipo] || {}).emoji || '') + ' ' + ((TIPO_META[e.tipo] || {}).label || e.tipo) : 'Entrada';
    fab.style.display  = 'none';
    container.innerHTML = await renderEntradaDetalle(currentEntradaId);
  }

  attachEvents();
}

// ── Vista: cultivos ──────────────────────────────────────────────────────────
async function renderCultivos() {
  const todos = await idbGetAll('c:');

  const filtrados = filtroEstado === 'todos'
    ? todos
    : todos.filter(c => c.estado === filtroEstado);

  filtrados.sort((a, b) => b.ts - a.ts);

  const chips = ['activo', 'cosechado', 'perdido', 'todos'];
  let html = `<div class="filtros">`;
  for (const f of chips) {
    const label = f === 'todos' ? 'Todos' : f.charAt(0).toUpperCase() + f.slice(1);
    const extra = f === 'todos' ? '' : ` chip-${f}`;
    html += `<span class="chip${extra}${filtroEstado === f ? ' active' : ''}" data-action="filtro" data-val="${f}">${label}</span>`;
  }
  html += `</div>`;

  if (filtrados.length === 0) {
    html += `<p class="empty">No hay cultivos. Pulsa + para crear el primero.</p>`;
    return html;
  }

  html += `<div id="cultivos-grid">`;
  for (const c of filtrados) {
    const fotos = await getFotosDeCultivo(c.id);
    let thumbHtml = `<div class="cultivo-thumb-placeholder">🌱</div>`;
    if (fotos.length > 0) {
      const src = await fotoSrc(fotos[fotos.length - 1]);
      thumbHtml = `<img class="cultivo-thumb" src="${src}" alt="foto">`;
    }
    const fechaTxt = c.fechaSiembra ? `Siembra: ${esc(c.fechaSiembra)}` : '';
    html += `
      <div class="cultivo-card" data-action="open-cultivo" data-id="${esc(c.id)}">
        <div class="cultivo-card-top">
          <div class="cultivo-info">
            <div class="cultivo-nombre">${esc(c.nombre)}</div>
            <div class="cultivo-especie">${esc(c.especie)}</div>
            ${fechaTxt ? `<div class="cultivo-fecha">${fechaTxt}</div>` : ''}
          </div>
          ${thumbHtml}
        </div>
        <div><span class="badge badge-${esc(c.estado)}">${esc(c.estado)}</span></div>
      </div>
    `;
  }
  html += `</div>`;
  return html;
}

// ── Vista: cultivo-detalle ────────────────────────────────────────────────────
async function renderCultivoDetalle(cultivoId) {
  const cultivo   = await idbGet('c:' + cultivoId);
  if (!cultivo) return `<button class="back-btn" onclick="goBack()">← Volver</button><p class="empty">Cultivo no encontrado.</p>`;

  const entradas  = await getEntradasDe(cultivoId);
  const estadoAct = cultivo.estado || 'activo';

  let html = `
    <button class="back-btn" onclick="goBack()">← Volver</button>

    <div class="detail-field">
      <div class="detail-label">Estado</div>
      <div class="estado-row">
        <button class="btn btn-estado btn-sm ${estadoAct==='activo'?'active-activo':''}"    data-action="set-estado" data-id="${esc(cultivoId)}" data-estado="activo">Activo</button>
        <button class="btn btn-estado btn-sm ${estadoAct==='cosechado'?'active-cosechado':''}" data-action="set-estado" data-id="${esc(cultivoId)}" data-estado="cosechado">Cosechado</button>
        <button class="btn btn-estado btn-sm ${estadoAct==='perdido'?'active-perdido':''}"  data-action="set-estado" data-id="${esc(cultivoId)}" data-estado="perdido">Perdido</button>
      </div>
    </div>

    <div class="detail-field">
      <div class="detail-label">Especie</div>
      <div class="detail-value">${esc(cultivo.especie)}</div>
    </div>
  `;

  if (cultivo.fechaSiembra) {
    html += `
      <div class="detail-field">
        <div class="detail-label">Fecha siembra</div>
        <div class="detail-value" style="font-family:'JetBrains Mono',monospace">${esc(cultivo.fechaSiembra)}</div>
      </div>
    `;
  }

  html += `
    <div class="toolbar">
      <button class="btn btn-primary btn-sm" onclick="openModalEntrada()">+ Entrada</button>
    </div>
    <div class="section-label">Bitácora (${entradas.length})</div>
  `;

  if (entradas.length === 0) {
    html += `<p class="empty">Sin entradas. Registra la primera actividad.</p>`;
  } else {
    html += `<div class="timeline">`;
    for (const entrada of entradas) {
      const meta = TIPO_META[entrada.tipo] || { emoji: '📝', label: entrada.tipo, cls: '' };
      const fotos = await getFotosDeEntrada(entrada.id);
      let fotosHtml = '';
      for (const f of fotos) {
        const src = await fotoSrc(f);
        fotosHtml += `<img class="entrada-thumb" src="${src}" alt="foto" data-action="lightbox" data-src="${src}">`;
      }
      html += `
        <div class="entrada-item">
          <div class="entrada-dot" data-action="open-entrada" data-id="${esc(entrada.id)}">${meta.emoji}</div>
          <div class="entrada-body" data-action="open-entrada" data-id="${esc(entrada.id)}">
            <div class="entrada-header">
              <span class="badge ${meta.cls}">${esc(meta.label)}</span>
              <span class="entrada-fecha">${esc(entrada.fechaISO)}</span>
            </div>
            <div class="entrada-desc">${esc(entrada.descripcion)}</div>
            ${fotosHtml ? `<div class="entrada-fotos">${fotosHtml}</div>` : ''}
          </div>
        </div>
      `;
    }
    html += `</div>`;
  }

  // Galería plana de todas las fotos del cultivo
  const todasFotos = await getFotosDeCultivo(cultivoId);
  if (todasFotos.length > 0) {
    html += `<div class="section-label">Galería (${todasFotos.length} fotos)</div><div class="galeria-grid">`;
    for (const f of todasFotos) {
      const src = await fotoSrc(f);
      html += `<img class="photo-thumb" src="${src}" alt="foto" data-action="lightbox" data-src="${src}">`;
    }
    html += `</div>`;
  }

  return html;
}

// ── Vista: entrada-detalle ────────────────────────────────────────────────────
async function renderEntradaDetalle(entradaId) {
  const entrada = await idbGet('a:' + entradaId);
  if (!entrada) return `<button class="back-btn" onclick="goBack()">← Volver</button><p class="empty">Entrada no encontrada.</p>`;

  const meta  = TIPO_META[entrada.tipo] || { emoji: '📝', label: entrada.tipo, cls: '' };
  const fotos = await getFotosDeEntrada(entradaId);

  let fotoGrid = '';
  for (const f of fotos) {
    const src = await fotoSrc(f);
    fotoGrid += `<img class="photo-thumb" src="${src}" alt="foto" data-action="lightbox" data-src="${src}">`;
  }

  let html = `
    <button class="back-btn" onclick="goBack()">← Volver</button>

    <div class="detail-field">
      <div class="detail-label">Tipo</div>
      <div class="detail-value"><span class="badge ${meta.cls}">${meta.emoji} ${esc(meta.label)}</span></div>
    </div>

    <div class="detail-field">
      <div class="detail-label">Fecha</div>
      <div class="detail-value" style="font-family:'JetBrains Mono',monospace">${esc(entrada.fechaISO)}</div>
    </div>

    <div class="detail-field">
      <div class="detail-label">Descripción</div>
      <textarea class="desc-edit" id="desc-edit" data-entrada-id="${esc(entradaId)}">${esc(entrada.descripcion)}</textarea>
      <div style="margin-top:8px">
        <button class="btn btn-primary btn-sm" data-action="save-desc" data-id="${esc(entradaId)}">Guardar</button>
      </div>
    </div>

    <div class="detail-field">
      <div class="detail-label">Fotos (${fotos.length})</div>
      <div class="photo-grid">
        ${fotoGrid}
        <div class="photo-placeholder" data-action="add-foto-entrada" data-id="${esc(entradaId)}" data-cultivo-id="${esc(entrada.cultivoId)}">📷</div>
      </div>
    </div>
    <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none"
           data-entrada-id="${esc(entradaId)}" data-cultivo-id="${esc(entrada.cultivoId)}">
  `;

  return html;
}

// ── Event delegation ──────────────────────────────────────────────────────────
function attachEvents() {
  const container = document.getElementById('view-container');

  container.onclick = async (e) => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;

    if (action === 'filtro') {
      filtroEstado = el.dataset.val;
      await render();

    } else if (action === 'open-cultivo') {
      currentCultivoId = el.dataset.id;
      view = 'cultivo-detalle';
      await render();

    } else if (action === 'open-entrada') {
      currentEntradaId = el.dataset.id;
      view = 'entrada-detalle';
      await render();

    } else if (action === 'set-estado') {
      await setEstadoCultivo(el.dataset.id, el.dataset.estado);
      await render();
      syncNow();

    } else if (action === 'save-desc') {
      const ta = document.getElementById('desc-edit');
      if (ta) {
        await updateEntradaDescripcion(el.dataset.id, ta.value);
        syncNow();
      }

    } else if (action === 'add-foto-entrada') {
      const input = document.getElementById('foto-input');
      if (input) {
        input.dataset.entradaId  = el.dataset.id;
        input.dataset.cultivoId  = el.dataset.cultivoId;
        input.click();
      }

    } else if (action === 'lightbox') {
      const lb = document.createElement('div');
      lb.className = 'lightbox';
      lb.innerHTML = `<img src="${el.dataset.src}" alt="foto">`;
      lb.onclick = () => lb.remove();
      document.body.appendChild(lb);
    }
  };

  // Input foto
  const fotoInput = document.getElementById('foto-input');
  if (fotoInput) {
    fotoInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const eid = fotoInput.dataset.entradaId;
      const cid = fotoInput.dataset.cultivoId;
      await addFoto(eid, cid, file);
      await render();
      syncNow();
      fotoInput.value = '';
    };
  }
}

// ── Navegación ────────────────────────────────────────────────────────────────
async function goBack() {
  if (view === 'entrada-detalle') {
    view = 'cultivo-detalle';
  } else if (view === 'cultivo-detalle') {
    view = 'cultivos';
    currentCultivoId = null;
  } else {
    view = 'cultivos';
  }
  currentEntradaId = null;
  await render();
}

// ── FAB ───────────────────────────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', () => {
  if (view === 'cultivos') openModalCultivo();
});

// ── Modales ───────────────────────────────────────────────────────────────────
function openModalCultivo() {
  document.getElementById('f-nombre').value        = '';
  document.getElementById('f-especie').value       = '';
  document.getElementById('f-fecha-siembra').value = '';
  document.getElementById('modal-cultivo').style.display = 'flex';
  setTimeout(() => document.getElementById('f-nombre').focus(), 50);
}

function openModalEntrada() {
  document.getElementById('f-tipo').value           = 'observacion';
  document.getElementById('f-descripcion').value    = '';
  document.getElementById('f-fecha-entrada').value  = todayStr();
  document.getElementById('modal-entrada').style.display = 'flex';
  setTimeout(() => document.getElementById('f-descripcion').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-cultivo').style.display = 'none';
  document.getElementById('modal-entrada').style.display = 'none';
}

async function submitCultivo() {
  const nombre  = document.getElementById('f-nombre').value.trim();
  const especie = document.getElementById('f-especie').value.trim();
  const fecha   = document.getElementById('f-fecha-siembra').value || null;
  if (!nombre) { document.getElementById('f-nombre').focus(); return; }
  closeModal();
  await createCultivo(nombre, especie, fecha);
  await render();
  syncNow();
}

async function submitEntrada() {
  const tipo        = document.getElementById('f-tipo').value;
  const descripcion = document.getElementById('f-descripcion').value.trim();
  const fechaISO    = document.getElementById('f-fecha-entrada').value || todayStr();
  if (!descripcion) { document.getElementById('f-descripcion').focus(); return; }
  closeModal();
  await addEntrada(currentCultivoId, tipo, descripcion, fechaISO);
  await render();
  syncNow();
}

// Cerrar modales al click fuera
document.getElementById('modal-cultivo').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('modal-entrada').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Escape cierra modales
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await openDB();
  await render();
  startSyncLoop();
}
init();
</script>
